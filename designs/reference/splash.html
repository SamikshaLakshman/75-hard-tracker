<script>
        function handleStart() {
            const btn = event.currentTarget;
            btn.classList.add('scale-90');
            setTimeout(() => {
                // In a real app, this would route to onboarding/dashboard
                console.log('Transitioning to Challenge Dashboard...');
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s ease-out';
            }, 200);
        }

        // Mouse follow effect for subtle glow
        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            const glow = document.querySelector('.bg-primary-fixed\\/10');
            if(glow) {
                const x = (mouseX / window.innerWidth) * 100;
                const y = (mouseY / window.innerHeight) * 100;
                glow.style.left = `${x - 30}%`;
                glow.style.top = `${y - 30}%`;
            }
        });
    </script>
